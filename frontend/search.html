<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search - ShopEase</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<header class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo"><span class="logo-icon">&#128717;</span><span>ShopEase</span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="clothes.html">Clothes</a>
      <a href="shoes.html">Shoes</a>
      <a href="electronics.html">Electronics</a>
      <a href="books.html">Books</a>
    </nav>
    <div class="nav-actions">
      <form class="search-form" onsubmit="handleSearch(event)">
        <input type="search" id="searchInput" placeholder="Search products..."/>
        <button type="submit">&#128269;</button>
      </form>
      <a href="cart.html" class="cart-btn">&#128722; Cart <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </div>
</header>

<div class="search-title">
  <h1 id="searchTitle">Search Results</h1>
</div>

<section class="products-section" style="background:white;padding-top:24px">
  <div class="product-grid" id="productGrid"></div>
</section>

<footer class="footer">
  <div class="footer-content">
    <div><h3>ShopEase</h3><p>Your premium destination for the finest Indian products.</p></div>
    <div><h4>Categories</h4><a href="clothes.html">Clothes</a><a href="shoes.html">Shoes</a><a href="electronics.html">Electronics</a><a href="books.html">Books</a></div>
    <div><h4>Help</h4><a href="#">Contact Us</a><a href="#">Shipping Policy</a></div>
  </div>
  <p class="footer-copy">&copy; 2025 ShopEase India. All rights reserved.</p>
</footer>

<script src="script.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || '';
  if (q) {
    document.getElementById('searchTitle').textContent = `Results for "${q}"`;
    const input = document.getElementById('searchInput');
    if (input) input.value = q;
    loadProducts(null, q);
  } else {
    document.getElementById('productGrid').innerHTML =
      '<p style="text-align:center;color:#6b7280;padding:60px;font-size:16px">Enter a search term above.</p>';
  }
  updateCartCount();
</script>
</body>
</html>
